aid: amazon-managed-apache-flink
name: Amazon Managed Service for Apache Flink
description: >-
  Amazon Managed Service for Apache Flink is the easiest way to transform and
  analyze streaming data in real time with Apache Flink. It enables you to
  build sophisticated streaming analytics applications using Apache Flink with
  fully managed infrastructure and pay-as-you-go pricing.
